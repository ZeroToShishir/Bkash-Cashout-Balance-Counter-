<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashout Counter</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
  --primary: #D12053;
  --bg: #ffffff;
  --card: #f8f8f8;
  --text: #111;
}

body.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #fff;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: var(--primary);
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border-radius: 12px;
  border: 1px solid #ccc;
  margin-top: 10px;
}

.rate-buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.rate-btn {
  flex: 1;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #ccc;
  font-size: 16px;
  cursor: pointer;
}

.rate-btn.active {
  background: var(--primary);
  color: #fff;
}

.calculate {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: black;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.result {
  text-align: center;
  font-size: 26px;
  margin-top: 20px;
  font-weight: bold;
}

.mode-toggle {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
}

.footer {
  text-align: center;
  margin-top: 20px;
}

.footer a {
  color: #1877F2;
  text-decoration: none;
  font-weight: bold;
}

.small {
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <h1>Cashout Counter</h1>

  <div class="card">
    <label>Enter Balance (৳)</label>
    <input type="number" id="balance" placeholder="e.g. 5250">

    <div class="rate-buttons">
      <button id="r1" class="rate-btn" onclick="selectRate(14.90, 'Preset 14.90')">14.90</button>
      <button id="r2" class="rate-btn" onclick="selectRate(18.50, 'Preset 18.50')">18.50</button>
    </div>

    <input type="number" id="manualRate" placeholder="Custom Rate (per 1000)" oninput="manualSelect()">

    <button class="calculate" onclick="calculate()">Calculate</button>

    <div class="result" id="result">৳ 0.00</div>
    <div class="small" id="rateInfo">No rate selected</div>
  </div>

  <div class="mode-toggle" onclick="toggleMode()">🌙 Toggle Day/Night</div>

  <div class="footer">
    Made by Shishir <br>
    <a href="https://www.facebook.com/imshishr" target="_blank">Facebook</a>
  </div>
</div>

<script>
let selectedRate = null;
let rateLabel = "";

// Highlight selection
function clearActive() {
  document.getElementById("r1").classList.remove("active");
  document.getElementById("r2").classList.remove("active");
}

// Preset rate select
function selectRate(rate, label) {
  selectedRate = rate;
  rateLabel = label;

  clearActive();

  if (rate === 14.90) document.getElementById("r1").classList.add("active");
  if (rate === 18.50) document.getElementById("r2").classList.add("active");

  document.getElementById("manualRate").value = "";
  updateRateInfo();
}

// Manual rate
function manualSelect() {
  let val = parseFloat(document.getElementById("manualRate").value);

  if (val > 0) {
    selectedRate = val;
    rateLabel = "Custom Rate: " + val;

    clearActive();
    updateRateInfo();
  }
}

// Update label
function updateRateInfo() {
  document.getElementById("rateInfo").innerText = "Using: " + rateLabel;
}

// Calculate
function calculate() {
  let balance = parseFloat(document.getElementById("balance").value);

  if (!balance || balance <= 0 || !selectedRate) {
    alert("Enter balance & select rate");
    return;
  }

  let cashout = balance / (1 + selectedRate / 1000);

  document.getElementById("result").innerText =
    "৳ " + cashout.toFixed(2);
}

// Dark mode
function toggleMode() {
  document.body.classList.toggle("dark");
}

// PWA service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
